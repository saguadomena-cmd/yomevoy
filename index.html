<style>
:root{--navy:#0D1F3C;--blue:#1A6E9E;--gold:#FFD400;--verde:#2F9E6E;--rojo:#E8323C;--naranja:#E67E22;--bg:#EFF3F7;--sup:#fff;--line:#D7E2EA;--suave:#5C7488;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:#142634;padding-bottom:120px}
.top{background:var(--navy);color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;position:sticky;top:0;z-index:30}
.top h1{font-size:16px;font-weight:800}.top .sub{font-size:11px;color:#BBD6E8;margin-top:2px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.st{background:rgba(255,255,255,.12);border-radius:10px;padding:7px 4px;text-align:center}
.st .n{font-size:17px;font-weight:800}.st .l{font-size:8.5px;color:#BBD6E8;text-transform:uppercase;letter-spacing:.3px}
.tabs{display:flex;gap:6px;padding:10px 12px 4px;overflow-x:auto}
.tb{flex:0 0 auto;background:#fff;border:1.5px solid var(--line);border-radius:100px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--navy)}
.tb.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.wrap{padding:8px 12px}
.card{background:var(--sup);border-radius:14px;box-shadow:0 2px 10px -4px rgba(11,53,80,.2);margin-bottom:10px;border-left:5px solid var(--line);overflow:hidden}
.card.ok{border-left-color:var(--verde);background:#F1FAF5}
.card.mia{box-shadow:0 0 0 2px #FFE9A8 inset}
.hd{display:flex;gap:10px;padding:12px;align-items:flex-start}
.chk{width:42px;height:42px;flex:0 0 auto;border-radius:12px;border:2.5px solid var(--line);background:#fff;font-size:20px;display:flex;align-items:center;justify-content:center}
.chk.on{background:var(--verde);border-color:var(--verde);color:#fff}
.nom{font-weight:700;font-size:14px;line-height:1.25}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.b{font-size:10px;font-weight:800;padding:3px 8px;border-radius:100px}
.b1{background:#E4F0F9;color:#1A6E9E}.b2{background:#FCE7E3;color:#E8323C}.b3{background:#E4F6EE;color:#2F9E6E}
.b4{background:#FFF3CE;color:#8A5A00}.b5{background:#FFE1B3;color:#8A3B00}
.rows{padding:0 12px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:9.5px;font-weight:700;color:var(--suave);text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{font-family:inherit;font-size:14px;padding:9px 10px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:#142634;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue)}
.full{grid-column:1/-1}
textarea{resize:vertical;min-height:44px}
.pay{display:flex;gap:6px}
.pill{flex:1;text-align:center;border:1.5px solid var(--line);border-radius:9px;padding:9px 4px;font-size:12px;font-weight:800;background:#fff;color:var(--suave)}
.pill.on{background:var(--verde);border-color:var(--verde);color:#fff}
.pill.no.on{background:var(--rojo);border-color:var(--rojo)}
.sec{font-size:11px;font-weight:800;color:var(--suave);text-transform:uppercase;letter-spacing:.5px;padding:12px 4px 6px}
.bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 12px calc(env(safe-area-inset-bottom) + 10px);display:flex;gap:8px;z-index:40}
.btn{flex:1;border:none;border-radius:11px;padding:13px;font-size:14px;font-weight:800;font-family:inherit}
.bp{background:var(--navy);color:#fff}.bg2{background:#fff;border:1.5px solid var(--line);color:var(--navy)}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--navy);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:.2s;z-index:60;pointer-events:none}
.toast.s{opacity:1;transform:translateX(-50%)}
.notas{background:#fff;border-radius:14px;padding:12px;margin-top:10px;box-shadow:0 2px 10px -4px rgba(11,53,80,.2)}
.notas h3{font-size:13px;color:var(--navy);margin-bottom:8px}
</style></head><body>

<script>

const KEY = "embarque_sanjuan_19jul2026";

function load(){

  BASE.forEach(r=>{

function guardar(aviso){
  E.notas=document.getElementById("notasgen").value;
  localStorage.setItem(KEY, JSON.stringify(E));

}

function stats(){
  let res=0, sub=0, cob=0, sen=0;
  BASE.forEach(r=>{ const e=E.rows[r.id]; res+=r.res; sen+=Number(e.senal!==undefined?e.senal:r.senal)||0;

  document.getElementById("s2").textContent=sub;
  document.getElementById("s3").textContent=Math.max(0,res-sub);

  const el=document.getElementById("libres");
  if(el) el.innerHTML = L>0 ? ("<b style='color:#FFD400'>"+L+" plazas libres</b>") : "<b style='color:#FFD400'>BUS COMPLETO</b>";
}

function tabs(){
  const puntos=["TODOS",...new Set(BASE.map(r=>r.punto))];

}

  let html="";
  puntos.forEach(p=>{
    if(filtro!=="TODOS" && filtro!==p) return;
    const rs=BASE.filter(r=>r.punto===p);
    const subP=rs.reduce((s,r)=>s+(E.rows[r.id].emb?(Number(E.rows[r.id].suben)||0):0),0);
    const resP=rs.reduce((s,r)=>s+r.res,0);
    html+=`<div class="sec">📍 ${p} — ${subP}/${resP} subidos</div>`;
    rs.forEach(r=>{
      const e=E.rows[r.id];
      const cambio = e.punto!==r.punto;
      html+=`<div class="card ${e.emb?'ok':''} ${r.mia?'mia':''}">
        <div class="hd">
          <div class="chk ${e.emb?'on':''}" onclick="tog('${r.id}')">${e.emb?'✓':''}</div>
          <div style="flex:1;min-width:0">
            <div class="nom">${r.nombre}</div>
            <div class="badges">
              <span class="b b1">Reservó ${r.res}</span>
              <span class="b b3">Pagó ${r.senal}€</span>
              ${e.pend>0?`<span class="b b2">Debe ${e.pend}€</span>`:`<span class="b b3">Pagado ✓</span>`}
              ${r.mia?'<span class="b b4">MI VENTA</span>':''}
              ${cambio?`<span class="b b5">CAMBIO → ${e.punto}</span>`:''}
            </div>
          </div>
        </div>
        <div class="rows">
          <div class="fld"><label>Suben</label>
            <input type="number" min="0" inputmode="numeric" value="${e.suben}" onchange="set('${r.id}','suben',this.value)"></div>
          <div class="fld"><label>Ya pagó €</label>
            <input type="number" min="0" inputmode="decimal" value="${e.senal!==undefined?e.senal:r.senal}" onchange="set('${r.id}','senal',this.value)"></div>
          <div class="fld"><label>Resto €</label>
            <input type="number" min="0" inputmode="decimal" value="${e.pend}" onchange="set('${r.id}','pend',this.value)"></div>
          <div class="fld full"><label>Cobro del resto</label>
            <div class="pay">
              <div class="pill ${e.pagado==='si'?'on':''}" onclick="set('${r.id}','pagado','si')">✅ Pagado</div>
              <div class="pill no ${e.pagado==='no'?'on':''}" onclick="set('${r.id}','pagado','no')">❌ No pagó</div>
            </div></div>
          <div class="fld full"><label>Punto donde sube (si cambia)</label>
            <select onchange="set('${r.id}','punto',this.value)">
              ${[...new Set(BASE.map(x=>x.punto))].map(pt=>`<option ${pt===e.punto?'selected':''}>${pt}</option>`).join("")}
            </select></div>
          <div class="fld full"><label>Comentarios</label>
            <textarea placeholder="Rezagado, viene más tarde, incidencia..." onchange="set('${r.id}','obs',this.value)">${e.obs||""}</textarea></div>
        </div>
      </div>`;
    });
  });
  cont.innerHTML=html;
  stats();
}
function tog(id){ E.rows[id].emb=!E.rows[id].emb; guardar(); render(); }
function set(id,campo,val){ E.rows[id][campo]=val; guardar(); if(campo!=="obs")render(); }

function exportar(){
  let t="EMBARQUE PLAYA SAN JUAN 19/07/2026\n\n";
  const puntos=[...new Set(BASE.map(r=>r.punto))];
  let tr=0,ts=0,tc=0;
  puntos.forEach(p=>{
    t+="== "+p+" ==\n";
    BASE.filter(r=>E.rows[r.id].punto===p).forEach(r=>{
      const e=E.rows[r.id];
      tr+=r.res; if(e.emb){ts+=Number(e.suben)||0; if(e.pagado==="si")tc+=Number(e.pend)||0;}
      t+=(e.emb?"[X] ":"[ ] ")+r.nombre+" — res:"+r.res+" suben:"+(e.emb?e.suben:0)
        +" pagó:"+(e.senal!==undefined?e.senal:r.senal)+"€ resto:"+e.pend+"€"+(e.pagado==="si"?" PAGADO":e.pagado==="no"?" NO PAGO":"")
        +(r.punto!==e.punto?" (cambió de "+r.punto+")":"")
        +(e.obs?" | "+e.obs:"")+"\n";
    });
    t+="\n";
  });
  t+="TOTAL reservados: "+tr+"\nPLAZAS LIBRES (bus 72): "+(72-tr)+"\nTOTAL subidos: "+ts+"\nFALTAN: "+(tr-ts)+"\nCOBRADO EN BUS: "+tc+"€\n";
  if(E.notas) t+="\nNOTAS:\n"+E.notas+"\n";
  if(navigator.share){ navigator.share({title:"Embarque San Juan",text:t}).catch(()=>{}); }
  else { navigator.clipboard.writeText(t); toast("📋 Copiado al portapapeles"); }
}

load(); tabs(); render();
window.addEventListener("beforeunload",()=>guardar());
</script></body></html>
